<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CB POKER - 抽牌选座版</title>
    <style>
        :root { --bg-dark: #242b35; --panel-bg: #11151a; --gold: #ffd700; --active-green: #2ecc71; }
        body { margin: 0; background: var(--bg-dark); color: white; font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        .hidden { display: none !important; }
        
        /* 布局容器 */
        .poker-table { width: 80vw; height: 50vh; background: radial-gradient(circle, #349feb 0%, #248ceb 100%); border: 20px solid #1c232c; border-radius: 250px; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        
        /* 抽屉日志 */
        #log-drawer { position: fixed; left: -320px; top: 0; width: 300px; height: 100%; background: rgba(17,21,26,0.95); border-right: 1px solid #333; z-index: 500; transition: 0.3s; display: flex; flex-direction: column; }
        #log-drawer.open { left: 0; }
        .log-content { flex: 1; overflow-y: auto; padding: 15px; font-size: 12px; color: #ccc; }
        
        /* 候场区 */
        .lobby-zone { position: absolute; left: 20px; bottom: 20px; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; border: 1px solid #444; width: 150px; }
        .lobby-title { font-size: 12px; color: var(--gold); margin-bottom: 8px; font-weight: bold; }
        .lobby-item { font-size: 13px; margin-bottom: 4px; opacity: 0.8; }

        /* 选座+号 */
        .seat-slot { position: absolute; width: 110px; height: 85px; border: 2px solid rgba(255,255,255,0.1); border-radius: 8px; transform: translate(-50%, -50%); display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.2); }
        .seat-add-btn { font-size: 40px; color: rgba(255,255,255,0.1); cursor: pointer; user-select: none; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        .seat-add-btn.highlight { color: var(--gold); background: rgba(255,215,0,0.1); }

        /* 抽牌阵列 */
        .draw-deck-area { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; gap: 10px; z-index: 100; }
        .draw-card { width: 60px; height: 90px; background: white; border-radius: 5px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; font-weight: bold; color: black; font-size: 20px; transition: 0.3s; }
        .draw-card.back { background: #1976d2; background-image: repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(255,255,255,0.1) 5px, rgba(255,255,255,0.1) 10px); }
        .draw-card:hover { transform: translateY(-10px); border: 2px solid var(--gold); }

        /* 播放动画所需的物理座位 */
        .s0 { top: 100%; left: 50%; } .s1 { top: 95%; left: 25%; } .s2 { top: 75%; left: 5%; } .s3 { top: 25%; left: 5%; } .s4 { top: 5%; left: 25%; }
        .s5 { top: 0%; left: 50%; } .s6 { top: 5%; left: 75%; } .s7 { top: 25%; left: 95%; } .s8 { top: 75%; left: 95%; } .s9 { top: 95%; left: 75%; }

        /* 其余样式沿用 V21 ... */
        .player-card { background: #000; padding: 10px; border-radius: 8px; width: 110px; text-align: center; border: 2px solid transparent; }
        .player-card.active { border-color: var(--active-green); box-shadow: 0 0 15px var(--active-green); }
        .pot-box { position: absolute; top: 35%; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.5); padding: 5px 15px; border-radius: 20px; color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>

    <div id="log-drawer">
        <div style="padding:15px; background:#111; color:var(--gold); font-weight:bold; border-bottom:1px solid #333;">📝 牌局记录</div>
        <div class="log-content" id="log-list"></div>
    </div>

    <div id="view-game" style="width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <div class="poker-table">
            <div class="pot-box">POT: $<span id="ui-pot">0</span></div>
            
            <div id="seats-container"></div>

            <div id="draw-zone" class="draw-deck-area hidden"></div>
            
            <div id="pick-seat-hint" class="hidden" style="position:absolute; top:20%; left:50%; transform:translateX(-50%); background:var(--gold); color:black; padding:10px 20px; border-radius:30px; font-weight:bold; z-index:200;">
                🎉 抽到最大牌！请在桌面上点选您的心仪座位
            </div>
        </div>

        <div class="lobby-zone">
            <div class="lobby-title">候场玩家</div>
            <div id="lobby-list"></div>
            <button id="btn-start-draw" class="hidden" style="margin-top:10px; width:100%; cursor:pointer;" onclick="send({type:'START_DRAW', name:myName})">🃏 发起抽牌</button>
        </div>

        <div id="host-panel" class="hidden" style="position:fixed; bottom:20px; right:20px; background:rgba(0,0,0,0.8); padding:15px; border-radius:10px;">
            <button onclick="send({type:'START_GAME', name:myName})" style="background:var(--active-green); border:none; padding:10px 20px; border-radius:5px; font-weight:bold; cursor:pointer;">▶ 开始游戏</button>
        </div>
    </div>

    <div id="join-modal" style="position:fixed; background:rgba(0,0,0,0.9); width:100%; height:100%; display:flex; justify-content:center; align-items:center; z-index:1000;">
        <div style="background:#1a1e24; padding:40px; border-radius:20px; text-align:center;">
            <h2 style="color:var(--gold);">POKER CHILL</h2>
            <input type="text" id="user-name" placeholder="输入昵称" style="padding:10px; width:200px;"><br><br>
            <button onclick="doJoin()" style="padding:10px 40px; background:var(--gold); border:none; border-radius:20px; font-weight:bold; cursor:pointer;">确认进入</button>
        </div>
    </div>

<script>
    const BACKEND_URL = "wss://poker-server.zxc717209554.workers.dev";
    let ws, myName = "", latestState;

    function doJoin() {
        myName = "😎|" + document.getElementById('user-name').value;
        document.getElementById('join-modal').classList.add('hidden');
        connect();
    }

    function connect() {
        ws = new WebSocket(BACKEND_URL + "?roomId=DEMO1");
        ws.onopen = () => ws.send(JSON.stringify({type:"JOIN", name:myName, settings:{initialChips:30, smallBlind:2.5, bigBlind:5, timer:0, botLevel:1}}));
        ws.onmessage = e => render(JSON.parse(e.data));
    }

    function send(obj) { ws.send(JSON.stringify(obj)); }

    function render(state) {
        latestState = state;
        document.getElementById('ui-pot').innerText = state.game.pot;
        
        // 渲染记录
        document.getElementById('log-list').innerHTML = state.game.logs.map(l => `<div style="margin-bottom:5px;">${l}</div>`).join('');

        // 渲染候场区
        const lobbyPlayers = state.players.filter(p => p.seatIndex === -1 && !p.isKicked);
        document.getElementById('lobby-list').innerHTML = lobbyPlayers.map(p => `<div class="lobby-item">${p.name.split('|')[1]}</div>`).join('');
        
        if (state.game.hostName === myName) {
            document.getElementById('btn-start-draw').classList.toggle('hidden', state.game.status !== "LOBBY");
            document.getElementById('host-panel').classList.toggle('hidden', state.game.status !== "WAITING");
        }

        // 渲染抽牌区
        const drawZone = document.getElementById('draw-zone');
        if (state.game.status === "DRAWING") {
            drawZone.classList.remove('hidden');
            drawZone.innerHTML = state.game.drawingCards.map(c => {
                return `<div class="draw-card ${c.faceUp?'':'back'}" onclick="send({type:'PICK_DRAW_CARD', name:myName})">${c.faceUp?c.card:''}</div>`;
            }).join('');
        } else { drawZone.classList.add('hidden'); }

        // 渲染选座提示
        const isWinner = state.game.winnerName === myName;
        document.getElementById('pick-seat-hint').classList.toggle('hidden', state.game.status !== "PICK_SEAT" || !isWinner);

        // 渲染座位
        const container = document.getElementById('seats-container');
        container.innerHTML = "";
        for (let i=0; i<10; i++) {
            const p = state.players.find(x => x.seatIndex === i && !x.isKicked);
            let html = `<div class="seat-slot s${i}">`;
            if (p) {
                const isActive = state.game.turnIndex === i;
                html += `<div class="player-card ${isActive?'active':''}">
                            <div style="font-size:24px;">${p.name.split('|')[0]}</div>
                            <div style="font-size:12px;">${p.name.split('|')[1]}</div>
                            <div style="color:var(--gold);font-weight:bold;">$${p.chips}</div>
                         </div>`;
            } else if (state.game.status === "PICK_SEAT" && isWinner) {
                html += `<div class="seat-add-btn highlight" onclick="send({type:'SELECT_SEAT', name:myName, seatIndex:${i}})">+</div>`;
            } else {
                html += `<div class="seat-add-btn">+</div>`;
            }
            html += `</div>`;
            container.innerHTML += html;
        }
    }
</script>
</body>
</html>
